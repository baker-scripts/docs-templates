name: Feature Request
description: Suggest a new feature or template improvement
labels: ["enhancement"]
body:
  - type: dropdown
    id: template
    attributes:
      label: Template
      description: Which template does this relate to?
      options:
        - Plex Guide
        - New Template Request
        - General
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What would you like?
      description: A clear description of the feature or improvement.
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Why is this useful? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've tried?
